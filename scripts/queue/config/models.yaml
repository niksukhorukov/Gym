      VLLM_DEFAULT_CHAT_TEMPLATE_KWARGS_B64: eyJlbmFibGVfdGhpbmtpbmciOnRydWV9
    vllm_extra_args:
      - --reasoning-parser
      - gemma4
    tool_vllm_extra_args:
      - --enable-auto-tool-choice
